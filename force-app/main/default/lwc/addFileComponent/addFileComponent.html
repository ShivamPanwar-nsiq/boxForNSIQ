<template>

    <lightning-card title={cardTitle}>

        <!-- Spinner -->
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading"></lightning-spinner>
        </template>

        <!-- Header -->
        <div class="slds-grid slds-grid_align-spread slds-m-around_small">

            <template if:true={showBackButton}>
                <lightning-button
                    label="Back"
                    icon-name="utility:back"
                    onclick={goBack}>
                </lightning-button>
            </template>

            <lightning-button
                label="Upload File"
                icon-name="utility:upload"
                variant="brand"
                onclick={openUpload}>
            </lightning-button>

        </div>

        <!-- Upload -->
        <template if:true={showUpload}>
            <div class="slds-box slds-theme_default slds-m-around_small">
                <c-box-file-upload
                    record-id={recordId}
                    object-api-name={objectApiName}
                    onuploadcomplete={handleUploadComplete}>
                </c-box-file-upload>
            </div>
        </template>

        <!-- Table -->
        <div class="slds-m-around_small">

            <table class="slds-table slds-table_cell-buffer slds-table_bordered">

                <thead>
                    <tr>
                        <th style="width:60px"></th>
                        <th>Name</th>
                        <th>Updated</th>
                        <th>Size</th>
                    </tr>
                </thead>

                <tbody>

                    <template for:each={items} for:item="item">

                        <tr key={item.rowId}
                            data-id={item.id}
                            data-name={item.name}
                            data-type={item.type}
                            data-url={item.url}>

                            <td>

                                <lightning-input
                                    type="checkbox"
                                    checked={item.checked}
                                    data-id={item.id}
                                    data-type={item.type}
                                    onchange={handleCheckbox}
                                    onclick={stopPropagation}>
                                </lightning-input>

                            </td>

                            <td onclick={handleClick} style="cursor:pointer">

                                <span style={item.indent}>

                                    <template if:true={item.isFolder}>
                                        <lightning-icon
                                            icon-name="utility:open_folder"
                                            size="small"
                                            class="slds-m-right_small">
                                        </lightning-icon>
                                    </template>

                                    <template if:true={item.isFile}>
                                        <lightning-icon
                                            icon-name="doctype:attachment"
                                            size="small"
                                            class="slds-m-right_small">
                                        </lightning-icon>
                                    </template>

                                    {item.name}

                                </span>

                            </td>

                            <td>{item.modifiedDisplay}</td>
                            <td>{item.sizeDisplay}</td>

                        </tr>

                    </template>

                </tbody>

            </table>

            <!-- Add File Button -->

            <template if:true={showAddButton}>

                <div class="slds-m-top_medium slds-align_absolute-center">

                    <lightning-button
                        label="Add File in Salesforce"
                        icon-name="utility:upload"
                        variant="brand"
                        onclick={handleAddToSalesforce}>
                    </lightning-button>

                </div>

            </template>

        </div>

    </lightning-card>

</template>
