<template>

    <lightning-card title="Box Files & Folders">

        <div class="slds-m-around_small">

            <lightning-button
                label="Back"
                onclick={goBack}
                class="slds-m-bottom_small">
            </lightning-button>

        </div>

        <template for:each={items} for:item="item">

            <div key={item.id}
                 class="slds-box slds-m-around_small"
                 data-id={item.id}
                 data-type={item.type}
                 data-url={item.url}
                 onclick={handleClick}
                 style="cursor:pointer">

                <template if:true={item.isFolder}>
                    📁 {item.name}
                </template>

                <template if:true={item.isFile}>
                    📄 {item.name}
                </template>

            </div>

        </template>

    </lightning-card>

</template>
